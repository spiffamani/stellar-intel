name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate conventional commit format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types (conventional commits spec)
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          # Optionally enforce scope (remove or adjust as needed)
          requireScope: false
          # Allow "!" breaking change marker (e.g. "feat!: drop Node 18")
          subjectPattern: ^.+$
          subjectPatternError: >
            The PR title must follow the Conventional Commits format:
            <type>[optional scope]: <description>

            Examples:
              feat: add yield rate comparison chart
              fix(swap): handle missing path response
              chore: update dependencies
              feat!: redesign on-ramp flow (breaking change)
          # Ignore dependabot and release PRs
          ignoreLabels: |
            release
            dependencies
